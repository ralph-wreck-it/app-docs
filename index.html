
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CareTrail</title>
  <meta name="description" content="CareTrail 公开页面入口">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3fb;
      --card: rgba(255, 255, 255, 0.9);
      --text: #162033;
      --muted: #5e6b82;
      --border: #d8e1ef;
      --accent: #2458f5;
      --shadow: 0 20px 50px rgba(20, 34, 66, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(36, 88, 245, 0.14), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    .card {
      width: min(100%, 620px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(36, 88, 245, 0.1);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 1.02rem;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 12px 28px rgba(36, 88, 245, 0.24);
    }

    a.button:hover {
      text-decoration: none;
      filter: brightness(1.03);
    }

    .note {
      margin-top: 16px;
      font-size: 0.94rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 24px 18px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">CareTrail</div>
    <h1>隐私政策入口</h1>
    <p>这里是患时记（CareTrail）的公开静态页面入口。你可以从这里查看完整的隐私协议，内容已整理为适合浏览器阅读的单页页面。</p>
    <div class="actions">
      <a class="button" href="./caretrail/privacy-policy.html">查看隐私政策</a>
      <a class="button" href="./caretrail/support.html">帮助与支持</a>
    </div>
    <div class="note">最后更新：2026 年 6 月 15 日</div>
  </main>
</body>
</html>
