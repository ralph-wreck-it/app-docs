      box-shadow: var(--shadow);

      content: "";
      position: absolute;
      inset: auto -8% -48% auto;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.16) 0%, rgba(15, 118, 110, 0) 70%);

      background: rgba(255, 255, 255, 0.76);

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderSection(section) {
      const paragraphs = (section.paragraphs || [])
        .map((text) => `<p>${escapeHtml(text)}</p>`)
        .join("");
      const bullets = (section.bullets || []).length
        ? `<ul>${section.bullets.map((text) => `<li>${escapeHtml(text)}</li>`).join("")}</ul>`
        : "";

        : "";
      return `
        <section class="card">
          <h2>${escapeHtml(section.title)}</h2>
          ${paragraphs}
          ${bullets}
          ${contact}
        </section>
      `;

    let currentPolicy = policies["zh-Hans"];

    function setLanguage(lang) {
      currentPolicy = policies[lang] || policies["zh-Hans"];
      document.documentElement.lang = lang;
      document.title = currentPolicy.title;
      titleEl.textContent = currentPolicy.title;
      subtitleEl.textContent = currentPolicy.subtitle;
      updatedEl.textContent = currentPolicy.updated;
      updatedLabelEl.textContent = currentPolicy.updatedLabel;
      contactLabelEl.textContent = currentPolicy.contactLabel;
      emailEl.textContent = currentPolicy.contact;
      emailEl.href = `mailto:${currentPolicy.contact}`;
      footerEl.textContent = currentPolicy.footer;
      contentEl.innerHTML = [
        currentPolicy.note
          ? `<section class="note">${escapeHtml(currentPolicy.note)}</section>`
          : "",
        ...currentPolicy.sections.map(renderSection)
      ].join("");
      renderSwitcher(lang);
      switcherEl.querySelectorAll("button[data-lang]").forEach((button) => {
        button.addEventListener("click", () => setLanguage(button.dataset.lang));
      });
    }

    const detected = (() => {
      const locale = (navigator.language || "zh-Hans").toLowerCase();
      if (locale.startsWith("zh-hant") || locale.startsWith("zh-tw") || locale.startsWith("zh-hk")) {
        return "zh-Hant";
      }
      if (locale.startsWith("en")) {
        return "en";
      }
      return "zh-Hans";
    })();

    setLanguage(detected);
  </script>
</body>
</html>
